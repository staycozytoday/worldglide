name: scrape jobs

on:
  schedule:
    - cron: "28 21 * * *" # 04:28 Bangkok (UTC+7) — morning
    - cron: "48 7 * * *"  # 14:48 Bangkok (UTC+7) — afternoon
    - cron: "28 13 * * *" # 20:28 Bangkok (UTC+7) — evening
  workflow_dispatch: # manual trigger

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: run scraper
        run: npx tsx scripts/scrape.ts

      - name: commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/
          git diff --cached --quiet || git commit -m "data: update jobs $(date -u +%Y-%m-%d)"
          git push

      - name: build static site
        run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: scrape
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
